name: CI

on:
  push:
  pull_request:

jobs:
  public-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Public fixture tests
        run: python3 tests/test_public_package.py

      - name: Memory guard
        run: python3 scripts/memory_guard.py

      - name: Public release check
        run: python3 scripts/public_release_check.py
